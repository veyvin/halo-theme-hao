apiVersion: v1alpha1
kind: AnnotationSetting
metadata:
  name: annotation-setting-hao-post
spec:
  targetRef:
    group: content.halo.run
    kind: Post
  formSchema:
    - $formkit: "radio"
      name: "homeCardCoverMode"
      id: "homeCardCoverMode"
      key: "homeCardCoverMode"
      label: "首页封面样式"
      value: "image"
      options:
        - label: "图片封面"
          value: "image"
        - label: "渐变艺术字"
          value: "gradient"
    - $formkit: "text"
      name: "homeCardCoverTitle"
      label: "艺术字主标题"
      if: "$get(homeCardCoverMode).value == 'gradient'"
      placeholder: "留空则使用文章标题"
    - $formkit: "text"
      name: "homeCardCoverSubtitle"
      label: "艺术字副标题"
      if: "$get(homeCardCoverMode).value == 'gradient'"
      placeholder: "可选，例如 Slow Growth"
    - $formkit: "text"
      name: "homeCardCoverBadge"
      label: "右上角标签"
      if: "$get(homeCardCoverMode).value == 'gradient'"
      placeholder: "可选，例如 TRENDING"
    - $formkit: "attachment"
      name: "homeCardCoverLogo"
      label: "封面徽标"
      if: "$get(homeCardCoverMode).value == 'gradient'"
      placeholder: "中间圆形徽标，可上传 png/webp"
      accepts:
        - 'image/*'
    - $formkit: "radio"
      name: "homeCardCoverPreset"
      label: "海报风格"
      if: "$get(homeCardCoverMode).value == 'gradient'"
      value: "tech"
      options:
        - label: "科技感"
          value: "tech"
        - label: "杂志感"
          value: "editorial"
        - label: "黑金感"
          value: "luxury"
    - $formkit: "color"
      name: "homeCardCoverStart"
      label: "渐变起始色"
      if: "$get(homeCardCoverMode).value == 'gradient'"
      value: "#6D5CFF"
    - $formkit: "color"
      name: "homeCardCoverEnd"
      label: "渐变结束色"
      if: "$get(homeCardCoverMode).value == 'gradient'"
      value: "#1EC8A5"
    - $formkit: "color"
      name: "homeCardCoverAccent"
      label: "高光点缀色"
      if: "$get(homeCardCoverMode).value == 'gradient'"
      value: "#F6D365"
    - $formkit: "color"
      name: "homeCardCoverTextColor"
      label: "文字颜色"
      if: "$get(homeCardCoverMode).value == 'gradient'"
      value: "#FFFFFF"
    - $formkit: "radio"
      name: "ai"
      label: "AI 摘要"
      help: "默认后台设置"
      options:
        - label: "启用"
          value: "true"
        - label: "禁用"
          value: "false"
    - $formkit: "radio"
      name: "copyrightEnable"
      id: "copyrightEnable"
      key: "copyrightEnable"
      label: "显示版权声明"
      help: "默认后台设置"
      options:
        - label: "显示"
          value: "true"
        - label: "隐藏"
          value: "false"
    - $formkit: "radio"
      name: "copyrightType"
      label: "版权声明类型"
      value: "original"
      if: "$get(copyrightEnable).value != 'false'"
      options:
        - label: "原创"
          value: "original"
        - label: "转载"
          value: "reprint"
    - $formkit: "text"
      name: "copyrightUrl"
      label: "版权声明链接"
      help: "默认后台设置"
      if: "$get(copyrightEnable).value != 'false'"
      placeholder: "请输入链接"
    - $formkit: attachment
      name: "audio"
      label: "音频文件"
      help: "音频文件"
      placeholder: "请输入"
      accepts:
        - 'audio/*'
---

apiVersion: v1alpha1
kind: AnnotationSetting
metadata:
  name: annotation-setting-hao-menu
spec:
  targetRef:
    group: ""
    kind: MenuItem
  formSchema:
    - $formkit: "text"
      name: "icon"
      label: "图标"
    - $formkit: "radio"
      name: "isVertical"
      value: "0"
      label: "该菜单的子菜单是否为垂直菜单"
      options:
        - label: "是"
          value: "1"
        - label: "否"
          value: "0"
---

apiVersion: v1alpha1
kind: AnnotationSetting
metadata:
  name: annotation-setting-hao-link-group
spec:
  targetRef:
    group: core.halo.run
    kind: LinkGroup
  formSchema:
    - $formkit: "radio"
      name: "displayStyle"
      label: "分组方式"
      value: "default"
      options:
        - label: "默认"
          value: "default"
        - label: "美化"
          value: "beautify"
        - label: "失联"
          value: "deprecated"
    - $formkit: "textarea"
      name: "description"
      label: "描述"

---

apiVersion: v1alpha1
kind: AnnotationSetting
metadata:
  name: annotation-setting-hao-link
spec:
  targetRef:
    group: core.halo.run
    kind: Link
  formSchema:
    - $formkit: "attachment"
      name: "siteshot"
      label: "背景"
    - $formkit: "text"
      name: "label"
      label: "标签"
    - $formkit: "color"
      name: "labelColor"
      value: "#425AEF"
      label: "标签颜色"

---

apiVersion: v1alpha1
kind: AnnotationSetting
metadata:
  name: annotation-setting-hao-photo-group
spec:
  targetRef:
    group: core.halo.run
    kind: PhotoGroup
  formSchema:
    - $formkit: "attachment"
      name: "cover"
      label: "分组图片"
    - $formkit: "attachment"
      name: "background"
      label: "分组顶部 banner 图片"
    - $formkit: "textarea"
      name: "description"
      label: "分组描述"

